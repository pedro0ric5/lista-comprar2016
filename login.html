<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#4A0D2E">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="src/css/login.css">
    <title>Lista 2016 | Login</title>
    <link rel="shortcut icon" href="src/icons/favicon.ico" type="image/x-icon">
    
    <!-- Pré-conexão para fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Ribeye&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animated">
        <div class="bg-shape shape-1"></div>
        <div class="bg-shape shape-2"></div>
        <div class="bg-shape shape-3"></div>
    </div>

    <div class="login-wrapper">
        <!-- Logo fora do container -->
        <div class="logo-outer">
            <img id="logo" src="src/icons/icon-512x512.png" alt="Lista 2016">
            <h1 class="brand-name">Lista 2016</h1>
        </div>

        <div class="container glass-effect">
            <h2 class="titulo">Acesse sua conta</h2>
            
            <form id="loginForm" novalidate>
                <div class="input-group">
                    <div class="input-icon email-icon"></div>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="Login" 
                        autocomplete="email"
                        required
                    >
                    <div class="input-feedback"></div>
                </div>

                <div class="input-group">
                    <div class="input-icon password-icon"></div>
                    <input 
                        type="password" 
                        id="senha" 
                        placeholder="Senha" 
                        autocomplete="current-password"
                        required
                    >
                    <button type="button" class="toggle-password" aria-label="Mostrar senha">
                        <span class="eye-icon"></span>
                    </button>
                    <div class="input-feedback"></div>
                </div>

                <div class="options-row">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember">
                        <span class="checkbox-custom"></span>
                        Lembrar-me
                    </label>
                    <a href="#" class="forgot-link">Esqueceu a senha?</a>
                </div>

                <div class="botoes">
                    <button type="submit" class="btn-primary" id="loginBtn">
                        <span class="btn-text">Entrar</span>
                        <div class="spinner"></div>
                    </button>
                    <button type="button" class="btn-secondary" onclick="cadastro()">
                        Criar nova conta
                    </button>
                </div>

                <div class="divider">
                    <span class="divider-text">ou continue com</span>
                </div>

                <div class="social-login">
                    <button type="button" class="social-btn" aria-label="Google">
                        <svg class="social-icon" viewBox="0 0 24 24">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                        </svg>
                    </button>
                    <button type="button" class="social-btn" aria-label="Apple">
                        <svg class="social-icon" viewBox="0 0 24 24">
                            <path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C4.56 16.97 4.85 11 8.23 10.06c1.17-.32 2.27.21 3.05.74.74.51 1.35.67 2.19.45.76-.2 1.48-.9 2.28-.94 1.63-.09 2.88.97 3.47 2.42-1.28.82-1.9 1.95-1.78 3.35.12 1.23.87 2.16 2.09 2.65-.47 1.29-1.2 2.37-2.38 3.55zM14.96 5.19c-.47.56-1.18.95-1.92.86-.16-.84.27-1.68.86-2.21.58-.53 1.42-.84 2.1-.7.09.85-.4 1.65-1.04 2.05z"/>
                        </svg>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
    <script>
        (function() {
            const form = document.getElementById('loginForm');
            const loginBtn = document.getElementById('loginBtn');
            const emailInput = document.getElementById('email');
            const senhaInput = document.getElementById('senha');
            const togglePassword = document.querySelector('.toggle-password');

            if (togglePassword) {
                togglePassword.addEventListener('click', function() {
                    const type = senhaInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    senhaInput.setAttribute('type', type);
                    this.classList.toggle('active');
                });
            }

            function validateEmail(email) {
                return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
            }

            function showInputFeedback(input, isValid) {
                const group = input.closest('.input-group');
                if (isValid) {
                    group.classList.remove('error');
                    group.classList.add('valid');
                } else if (input.value.length > 0) {
                    group.classList.remove('valid');
                    group.classList.add('error');
                } else {
                    group.classList.remove('valid', 'error');
                }
            }

            emailInput.addEventListener('input', function() {
                showInputFeedback(this, validateEmail(this.value));
            });

            senhaInput.addEventListener('input', function() {
                showInputFeedback(this, this.value.length >= 6);
            });

            form.addEventListener('submit', async function(e) {
                e.preventDefault();

                const isEmailValid = validateEmail(emailInput.value);
                const isPasswordValid = senhaInput.value.length >= 6;

                showInputFeedback(emailInput, isEmailValid);
                showInputFeedback(senhaInput, isPasswordValid);

                if (!isEmailValid || !isPasswordValid) {
                    form.style.animation = 'shake 0.3s ease-in-out';
                    setTimeout(() => { form.style.animation = ''; }, 300);
                    return;
                }

                loginBtn.classList.add('loading');
                loginBtn.disabled = true;

                try {
                    await window.login();
                } catch (error) {
                    console.error('Login error:', error);
                } finally {
                    setTimeout(() => {
                        if (!window.location.href.includes('index.html')) {
                            loginBtn.classList.remove('loading');
                            loginBtn.disabled = false;
                        }
                    }, 3000);
                }
            });

            if (localStorage.getItem('rememberedEmail')) {
                emailInput.value = localStorage.getItem('rememberedEmail');
                document.getElementById('remember').checked = true;
            }

            document.getElementById('remember').addEventListener('change', function(e) {
                if (!e.target.checked) {
                    localStorage.removeItem('rememberedEmail');
                } else {
                    localStorage.setItem('rememberedEmail', emailInput.value);
                }
            });
        })();
    </script>
</body>
</html>
