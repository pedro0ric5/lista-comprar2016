<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="src/css/index.css">
    <link rel="shortcut icon" href="src/icons/favicon.ico" type="image/x-icon">
    <title>lista de compras</title>
</head>
<body>
        <img id="logo" src="src/icons/icon-512x512.png" alt="logo">
    <div class="container">
        <h2 class="titulo"> listinha de compras</h2>
        
        <ul id="lista"></ul>

        <input type="text" id="item" placeholder="Novo Item">

        <div class="botoes">
            <button onclick="adicionarItem()">Adicionar</button>
            <button onclick="logout()">--Sair--</button>
        </div>
    </div>

        <script type="module" src="app.js"></script>
        <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(registration => {
                        console.log('ServiceWorker registrado com sucesso:', registration.scope);
                    })
                    .catch(error => {
                        console.log('Falha ao registrar o ServiceWorker:', error);
                    });
            });
        }
    </script>
</body>
</html>
