<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#4A0D2E">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="src/css/index.css">
    <link rel="shortcut icon" href="src/icons/favicon.ico" type="image/x-icon">
    <title>Lista 2016 | Minha Lista</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Ribeye&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-wrapper">
        <!-- Logo externa -->
        <div class="logo-outer">
            <img id="logo" src="src/icons/icon-512x512.png" alt="Lista 2016">
        </div>

        <div class="container">
            <div class="header-actions">
                <h2 class="titulo">Minha Lista</h2>
                <button onclick="logout()" class="btn-logout" aria-label="Sair">
                    <span class="logout-icon">🚪</span>
                    <span>Sair</span>
                </button>
            </div>
            
            <div class="stats-bar">
                <div class="stat-item">
                    <span class="stat-number" id="totalItems">0</span>
                    <span class="stat-label">itens</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-number" id="checkedItems">0</span>
                    <span class="stat-label">comprados</span>
                </div>
            </div>

            <ul id="lista" class="shopping-list"></ul>

            <div class="add-item-area">
                <input 
                    type="text" 
                    id="item" 
                    placeholder="Digite um novo item..." 
                    autocomplete="off"
                    aria-label="Novo item"
                >
                <button onclick="adicionarItem()" class="btn-add" aria-label="Adicionar item">
                    <span class="add-icon">+</span>
                    Adicionar
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(registration => {
                        console.log('ServiceWorker registrado com sucesso:', registration.scope);
                    })
                    .catch(error => {
                        console.log('Falha ao registrar o ServiceWorker:', error);
                    });
            });
        }
    </script>
</body>
</html>
